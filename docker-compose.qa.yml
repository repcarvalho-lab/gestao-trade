name: traderos-qa

services:
  postgres-qa:
    image: postgres:16-alpine
    container_name: traderos-postgres-qa
    restart: unless-stopped
    environment:
      POSTGRES_DB: traderos_qa
      POSTGRES_USER: traderos
      POSTGRES_PASSWORD: traderos_qa_pass
    ports:
      - "5434:5432"
    volumes:
      - postgres_qa_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traderos -d traderos_qa"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - traderos-qa

  backend-qa:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: traderos-backend-qa
    restart: unless-stopped
    env_file: .env.qa
    expose:
      - "4001"
    depends_on:
      postgres-qa:
        condition: service_healthy
    networks:
      - traderos-qa

  frontend-qa:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3001/api
    container_name: traderos-frontend-qa
    restart: unless-stopped
    networks:
      - traderos-qa

  nginx-qa:
    image: nginx:alpine
    container_name: traderos-nginx-qa
    restart: unless-stopped
    ports:
      - "3001:80"
    volumes:
      - ./infra/nginx/nginx.qa.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-qa
      - frontend-qa
    networks:
      - traderos-qa

networks:
  traderos-qa:
    driver: bridge

volumes:
  postgres_qa_data:
